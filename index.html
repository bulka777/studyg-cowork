<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>studyg</title>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:               #ffffff;
      --surface:          #f6f8fa;
      --border:           #d0d7de;
      --text:             #1f2328;
      --muted:            #656d76;
      --link:             #0969da;

      --understood:       #1a7f37;
      --understood-bg:    #dafbe1;
      --encountered:      #9a6700;
      --encountered-bg:   #fff8c5;
      --shaky:            #cf222e;
      --shaky-bg:         #ffebe9;
      --unseen:           #57606a;
      --unseen-bg:        #f6f8fa;

      --frontier-bg:      #ddf4ff;
      --frontier-border:  #54aeff;
      --frontier-text:    #0550ae;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:               #0d1117;
        --surface:          #161b22;
        --border:           #30363d;
        --text:             #e6edf3;
        --muted:            #8b949e;
        --link:             #58a6ff;

        --understood:       #3fb950;
        --understood-bg:    #0d2e17;
        --encountered:      #d29922;
        --encountered-bg:   #2d2000;
        --shaky:            #f85149;
        --shaky-bg:         #2d0e0c;
        --unseen:           #8b949e;
        --unseen-bg:        #21262d;

        --frontier-bg:      #051d4d;
        --frontier-border:  #1f6feb;
        --frontier-text:    #79c0ff;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 16px 64px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    header .subtitle { color: var(--muted); font-size: 14px; }

    /* ── Subject card ── */
    .subject {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .subject-header {
      padding: 20px 24px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .subject-header h2 { font-size: 17px; font-weight: 600; }
    .subject-header .desc { color: var(--muted); margin-top: 3px; font-size: 13px; }

    /* Progress bar */
    .progress-wrap { margin-top: 14px; }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .progress-labels .shaky-label { color: var(--shaky); }
    .progress-bar {
      height: 7px;
      border-radius: 4px;
      background: var(--border);
      overflow: hidden;
      display: flex;
    }
    .bar-understood  { background: var(--understood); }
    .bar-encountered { background: var(--encountered); }
    .bar-shaky       { background: var(--shaky); }

    /* Pills */
    .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .pill.understood { color: var(--understood); background: var(--understood-bg); }
    .pill.encountered{ color: var(--encountered); background: var(--encountered-bg); }
    .pill.shaky      { color: var(--shaky);       background: var(--shaky-bg); }
    .pill.unseen     { color: var(--unseen);       background: var(--unseen-bg); }
    .pill.cards-due  { color: var(--link); background: var(--frontier-bg); }

    /* Body */
    .subject-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Frontier ── */
    .frontier-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .frontier-item {
      padding: 9px 13px;
      background: var(--frontier-bg);
      border: 1px solid var(--frontier-border);
      border-radius: 6px;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px;
    }
    .frontier-item .cname { font-weight: 500; color: var(--frontier-text); }
    .frontier-item .csummary { font-size: 13px; color: var(--frontier-text); opacity: 0.75; }

    /* ── Concept map (collapsible) ── */
    details {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    details summary {
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 500;
      background: var(--surface);
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary::before {
      content: "▶";
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.15s;
      display: inline-block;
    }
    details[open] summary::before { transform: rotate(90deg); }
    details summary:hover { background: var(--border); }

    .concept-grid { padding: 14px; display: flex; flex-direction: column; gap: 14px; }

    .tier-block {}
    .tier-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 7px;
      padding-left: 16px;
    }
    .concept-row {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 3px 0;
    }
    .state-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }
    .state-dot.understood  { background: var(--understood); }
    .state-dot.encountered { background: var(--encountered); }
    .state-dot.shaky       { background: var(--shaky); }
    .state-dot.unseen      { background: var(--border); }
    .cname  { font-weight: 500; }
    .csummary { color: var(--muted); font-size: 13px; }

    /* ── Deep dives ── */
    .dive-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .dive-item {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .dive-item:hover { border-color: var(--link); }
    .dive-item a {
      color: var(--link);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
    }
    .dive-item a:hover { text-decoration: underline; }
    .dive-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    .dive-concepts { font-style: italic; }
    .mint-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
    }
    .dive-summary { font-size: 13px; color: var(--muted); margin-top: 5px; }

    /* ── States ── */
    .loading, .error { text-align: center; color: var(--muted); padding: 48px; }
    .error { color: var(--shaky); }
  </style>
</head>
<body>
  <header>
    <h1>studyg</h1>
    <span class="subtitle">Personal learning system</span>
  </header>
  <main id="app">
    <p class="loading">Loading…</p>
  </main>

  <script>
    /* ── Utilities ── */

    async function fetchYaml(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        return jsyaml.load(await res.text());
      } catch (e) {
        console.warn('Failed to fetch', url, e);
        return null;
      }
    }

    function esc(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function fmtDate(d) {
      if (!d) return '';
      const date = d instanceof Date ? d : new Date(d);
      if (isNaN(date)) return String(d);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function toDateStr(d) {
      if (!d) return '';
      if (d instanceof Date) return d.toISOString().slice(0, 10);
      return String(d).slice(0, 10);
    }

    /* ── Data helpers ── */

    function buildMasteryMap(progress) {
      const m = {};
      for (const entry of (progress?.mastery ?? [])) m[entry.id] = entry;
      return m;
    }

    function computeStats(progress) {
      const counts = { understood: 0, encountered: 0, shaky: 0, unseen: 0 };
      for (const entry of (progress?.mastery ?? [])) {
        counts[entry.state] = (counts[entry.state] ?? 0) + 1;
      }
      return counts;
    }

    function computeFrontier(map, masteryMap) {
      return (map?.concepts ?? []).filter(c => {
        const state = masteryMap[c.id]?.state ?? 'unseen';
        if (state === 'understood') return false;
        return (c.prereqs ?? []).every(p => masteryMap[p]?.state === 'understood');
      });
    }

    function countDueCards(cards) {
      const today = new Date().toISOString().slice(0, 10);
      return (cards?.cards ?? []).filter(c => toDateStr(c.due) <= today).length;
    }

    function lastActive(progress) {
      const dates = (progress?.mastery ?? [])
        .map(m => toDateStr(m.last_reviewed))
        .filter(Boolean)
        .sort();
      return dates.at(-1) ?? null;
    }

    /* ── Render ── */

    function renderSubject(subject) {
      const { map, progress, dives, cards, folder } = subject;
      const masteryMap = buildMasteryMap(progress);
      const counts     = computeStats(progress);
      const total      = Object.values(counts).reduce((a, b) => a + b, 0);
      const frontier   = computeFrontier(map, masteryMap);
      const due        = countDueCards(cards);
      const active     = lastActive(progress);

      const pct = k => total ? (counts[k] / total * 100).toFixed(1) : 0;

      // Group concepts by tier
      const byTier = {};
      for (const c of (map?.concepts ?? [])) {
        const t = c.tier ?? 0;
        (byTier[t] = byTier[t] ?? []).push(c);
      }

      return `
<section class="subject">
  <div class="subject-header">
    <h2>${esc(map?.subject ?? subject.name)}</h2>
    ${subject.description ? `<p class="desc">${esc(subject.description)}</p>` : ''}
    <div class="progress-wrap">
      <div class="progress-labels">
        <span>${counts.understood} of ${total} concepts understood${active ? ` · last active ${fmtDate(active)}` : ''}</span>
        ${counts.shaky > 0 ? `<span class="shaky-label">${counts.shaky} shaky</span>` : ''}
      </div>
      <div class="progress-bar">
        <div class="bar-understood"  style="width:${pct('understood')}%"></div>
        <div class="bar-encountered" style="width:${pct('encountered')}%"></div>
        <div class="bar-shaky"       style="width:${pct('shaky')}%"></div>
      </div>
    </div>
    <div class="pills">
      ${counts.understood  > 0 ? `<span class="pill understood">&#10003; ${counts.understood} understood</span>` : ''}
      ${counts.encountered > 0 ? `<span class="pill encountered">&#126; ${counts.encountered} encountered</span>` : ''}
      ${counts.shaky       > 0 ? `<span class="pill shaky">&#10005; ${counts.shaky} shaky</span>` : ''}
      ${counts.unseen      > 0 ? `<span class="pill unseen">&#9702; ${counts.unseen} unseen</span>` : ''}
      ${due                > 0 ? `<span class="pill cards-due">&#128337; ${due} card${due !== 1 ? 's' : ''} due</span>` : ''}
    </div>
  </div>

  <div class="subject-body">
    ${renderFrontier(frontier)}
    ${renderConcepts(byTier, masteryMap, total)}
    ${renderDives(dives, folder)}
  </div>
</section>`;
    }

    function renderFrontier(frontier) {
      if (!frontier.length) return '';
      return `
<div>
  <div class="section-title">Ready to learn</div>
  <ul class="frontier-list">
    ${frontier.map(c => `
    <li class="frontier-item">
      <span class="cname">${esc(c.name)}</span>
      ${c.summary ? `<span class="csummary">${esc(c.summary)}</span>` : ''}
    </li>`).join('')}
  </ul>
</div>`;
    }

    function renderConcepts(byTier, masteryMap, total) {
      const tiers = Object.keys(byTier).sort((a, b) => Number(a) - Number(b));
      if (!tiers.length) return '';
      return `
<details>
  <summary>All concepts (${total})</summary>
  <div class="concept-grid">
    ${tiers.map(t => `
    <div class="tier-block">
      <div class="tier-label">Tier ${t}</div>
      ${byTier[t].map(c => {
        const state = masteryMap[c.id]?.state ?? 'unseen';
        return `
      <div class="concept-row">
        <span class="state-dot ${state}"></span>
        <div>
          <span class="cname">${esc(c.name)}</span>
          ${c.summary ? `<span class="csummary"> — ${esc(c.summary)}</span>` : ''}
        </div>
      </div>`;
      }).join('')}
    </div>`).join('')}
  </div>
</details>`;
    }

    function renderDives(dives, folder) {
      const list = dives?.deep_dives ?? [];
      if (!list.length) return '';
      return `
<div>
  <div class="section-title">Deep dives (${list.length})</div>
  <ul class="dive-list">
    ${list.map(d => {
      const path  = `${folder}${d.file}`;
      const title = d.source_title || d.id;
      return `
    <li class="dive-item">
      <a href="${esc(path)}" target="_blank" rel="noopener noreferrer">${esc(title)}</a>
      <div class="dive-meta">
        ${d.generated ? `<span>${fmtDate(d.generated)}</span>` : ''}
        ${d.concepts?.length  ? `<span class="dive-concepts">${d.concepts.map(esc).join(', ')}</span>` : ''}
        ${d.cards_minted ? '<span class="mint-badge">cards minted</span>' : ''}
      </div>
      ${d.summary ? `<p class="dive-summary">${esc(d.summary)}</p>` : ''}
    </li>`;
    }).join('')}
  </ul>
</div>`;
    }

    /* ── Main ── */

    async function main() {
      const app = document.getElementById('app');

      const index = await fetchYaml('index.yaml');
      if (!index?.subjects?.length) {
        app.innerHTML = '<p class="error">Could not load index.yaml — make sure GitHub Pages is serving from the repo root.</p>';
        return;
      }

      const subjects = await Promise.all(index.subjects.map(async s => {
        const [map, progress, dives, cards] = await Promise.all([
          fetchYaml(s.map),
          fetchYaml(s.progress),
          fetchYaml(s.deep_dives),
          fetchYaml(s.cards),
        ]);
        return { ...s, map, progress, dives, cards };
      }));

      app.innerHTML = subjects.map(renderSubject).join('');
    }

    main();
  </script>
</body>
</html>
